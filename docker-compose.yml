# =============================================================================
# Automated Lithology Classification System - Docker Compose
# =============================================================================
version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-backend-env: &backend-env
  env_file:
    - .env
  environment:
    - PYTHONDONTWRITEBYTECODE=1
    - PYTHONUNBUFFERED=1

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: lithology_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-lithology_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-lithology_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - lithology_network
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Redis Cache & Message Broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: lithology_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lithology_network
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # FastAPI Backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: lithology_backend:latest
    container_name: lithology_backend
    restart: unless-stopped
    <<: *backend-env
    volumes:
      - uploads:/app/uploads
      - model_weights:/app/model_weights
      - faiss_index:/app/faiss_index
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - lithology_network
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Celery Worker (ML Task Processing)
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: lithology_backend:latest
    container_name: lithology_celery_worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 --queues=default,ml_tasks --hostname=worker@%h
    <<: *backend-env
    volumes:
      - uploads:/app/uploads
      - model_weights:/app/model_weights
      - faiss_index:/app/faiss_index
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks.celery_app", "inspect", "ping", "-d", "celery@worker"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - lithology_network
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Celery Beat (Scheduled Tasks)
  # ---------------------------------------------------------------------------
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: lithology_backend:latest
    container_name: lithology_celery_beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    <<: *backend-env
    volumes:
      - uploads:/app/uploads
      - model_weights:/app/model_weights
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
    networks:
      - lithology_network
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # React Vite Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        - VITE_API_BASE_URL=/api/v1
        - VITE_APP_NAME=Lithology AI
        - VITE_APP_VERSION=1.0.0
    image: lithology_frontend:latest
    container_name: lithology_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - lithology_network
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: lithology_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - lithology_network
    logging: *default-logging

# =============================================================================
# Networks
# =============================================================================
networks:
  lithology_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
    name: lithology_postgres_data
  redis_data:
    driver: local
    name: lithology_redis_data
  uploads:
    driver: local
    name: lithology_uploads
  model_weights:
    driver: local
    name: lithology_model_weights
  faiss_index:
    driver: local
    name: lithology_faiss_index
  nginx_logs:
    driver: local
    name: lithology_nginx_logs
